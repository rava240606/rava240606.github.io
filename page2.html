<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      font-family: Arial;
      color: white;
      text-align: center;
    }

    .card {
      padding: 40px;
      border-radius: 20px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(15px);
    }

    button {
      margin-top: 20px;
      padding: 10px 25px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="card">
  <h1 id="text"></h1>
  <button onclick="next()">Read more 💌</button>
</div>

<audio autoplay loop src="music.mp3"></audio>

<script>
let lines = [
  "I made this just for you… ❤️",
  "Because you are really special to me…",
  "And I mean it…"
];

let i = 0;

function typeLine() {
  if(i < lines.length){
    document.getElementById("text").innerHTML = lines[i];
    i++;
    setTimeout(typeLine, 2000);
  }
}

typeLine();

function next(){
  window.location.href = "page3.html";
}
</script>

</body>
</html>
