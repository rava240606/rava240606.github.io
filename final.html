<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday ❤️</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: Arial;
      text-align: center;
    }

    .box {
      max-width: 500px;
    }

    img {
      width: 150px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>Okay jokes apart… ❤️</h1>
  <p>
    You really mean a lot to me 💫<br>
    I just wanted to make you smile today 😊<br><br>
    Happy Birthday 🎂✨
  </p>

  <img src="chimpanzee.png" alt="funny chimp">
</div>

<script>
// simple confetti effect
setInterval(() => {
  let confetti = document.createElement("div");
  confetti.innerHTML = "🎉";
  confetti.style.position = "absolute";
  confetti.style.left = Math.random()*100 + "vw";
  confetti.style.top = "-10px";
  document.body.appendChild(confetti);

  setTimeout(()=>confetti.remove(),3000);
},300);
</script>

</body>
</html>
